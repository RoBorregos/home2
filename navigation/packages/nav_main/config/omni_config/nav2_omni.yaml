# nav2 parameters — mecanum OMNIDIRECTIONAL omnibase, indoor.
#
# Adapted from a differential-drive (Nova Carter) config. Key changes:
#   * MPPI motion_model DiffDrive -> Omni, with vy sampling/limits enabled.
#   * Obstacle sensing is TWO layers: the 360 deg RPLIDAR C1 (/scan) feeds a 2D
#     obstacle_layer, and the filtered ZED2 cloud (/point_cloud) feeds a 3D
#     SpatioTemporalVoxelLayer (rgbd_obstacle_layer) — same config as the dashgo
#     base. STVL TIME-DECAYS voxels (voxel_decay), so stray marks clear on their
#     own even while the robot is stopped. min_obstacle_height (0.30) drops floor
#     returns. NOTE: requires the spatio_temporal_voxel_layer package installed.
#   * Removed the charging-dock server (nova_carter_dock) — not on this robot.
#   * Removed PreferForwardCritic (a diff-drive forward bias) and ObstaclesCritic
#     (redundant with CostCritic, the modern footprint-aware obstacle critic).
#   * odom_topic -> /odrive/odom (raw ODrive wheel odometry, not the EKF output).
#   * Added the controller_plugins / progress_checker / goal_checker that were
#     missing from the source file (nav2 will not load FollowPath without them).
#   * velocity_smoother + MPPI limits opened up on the Y (lateral) axis.
#
# Localization: this assumes slam_toolbox localization_slam_toolbox_node provides
# map->odom and publishes /map (see localization.launch.py). No AMCL needed.
#
# !!! VERIFY BEFORE DRIVING !!!
#   * footprint below is an ESTIMATE (~0.48 m square). MEASURE your robot
#     (chassis + wheels + bumpers) and set the real polygon — this is the #1
#     safety parameter.
#   * /cmd_vel from nav2 now carries linear.y. Your base command bridge
#     (cmd_vel -> STM32/ESP32) MUST pass linear.y through, or the robot will
#     ignore all lateral motion the planner asks for.

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odrive/odom
    bt_loop_duration: 50
    default_server_timeout: 20
    wait_for_service_timeout: 10000
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav_main)/bt/navigate_to_pose_w_replanning_and_recovery.xml"

    # Custom BT removed (referenced the other robot's nav_main package). nav2's
    # built-in default IS navigate_to_pose_w_replanning_and_recovery.xml, so
    # leaving this unset gives the same replanning+recovery behavior.

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 15.0
    odom_topic: /odrive/odom
    # These three were missing in the source file but are REQUIRED.
    controller_plugins: ["FollowPath"]
    progress_checker_plugins: ["progress_checker"]   # Nav2 1.4.0 renamed the singular progress_checker_plugin -> plural list
    goal_checker_plugins: ["general_goal_checker"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15      # tighten for more precise stops (omni can hit ~0.1 cleanly)
      yaw_goal_tolerance: 0.15

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 36
      model_dt: 0.07               # 36 * 0.07 = 2.5 s prediction horizon
      batch_size: 1200             # lower to ~600-800 if the robot CPU is maxed at 15 Hz
      # ---- Sampling std-devs: vy MUST be > 0 for the base to explore strafing ----
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.3
      # ---- Velocity limits (symmetric for a holonomic base) ----
      vx_max: 0.5
      vx_min: -0.35
      vy_max: 0.5                  # was 0.0 (diff drive) — lateral motion now allowed
      wz_max: 1.2
      # ---- Acceleration limits ----
      ax_max: 2.2
      ax_min: -1.8
      ay_max: 2.0                  # was 0.0 — lateral accel now allowed
      az_max: 2.5
      iteration_count: 2
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"         # <-- the core change: holonomic model (vx, vy, wz)
      visualize: false
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      # ObstaclesCritic + PreferForwardCritic dropped (see header).
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        critical_cost: 300.0
        consider_footprint: true   # footprint-aware collision cost (set the real footprint below!)
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 3
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0           # keeps the robot ON the path (position) — important for omni
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        # mode 1 = NO_DIRECTIONAL_PREFERENCE: lets the base strafe / face any way along
        # the path (safe — the C1 lidar is 360 deg). Final heading is set by GoalAngleCritic.
        mode: 1

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      # ESTIMATE — symmetric ~0.48 m square. MEASURE and replace with the real polygon.
      footprint: "[ [0.325, 0.25], [0.325, -0.25], [-0.325, -0.25], [-0.325, 0.25] ]"
      plugins: ["obstacle_layer", "rgbd_obstacle_layer", "inflation_layer"]
      # Keepout (virtual obstacles) is an OPT-IN overlay applied only when
      # use_keepout:=true — see nav2_omni_keepout.yaml + nav2_omni.launch.py.
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0   # gentler than the source's 7.0 -> smoother cost gradient for MPPI
        inflation_radius: 0.45     # MUST be > circumscribed radius (~0.424 = footprint + 0.01 padding); soft cost gradient, not a hard clearance
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0  # raised — C1 sees 12 m; this covers the 4x4 m local window
          raytrace_min_range: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.10
      rgbd_obstacle_layer:
        # 3D obstacles from the ZED2 cloud via SpatioTemporalVoxelLayer (same as
        # the dashgo base). STVL TIME-DECAYS voxels (voxel_decay seconds), so stray
        # marks clear on their own even while the robot is stopped — that fixes the
        # "phantom points linger until the robot moves" problem.
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 2.0           # s — lower for faster auto-clear of stale marks
        decay_model: 0             # 0=linear, 1=exponential, -1=persistent
        voxel_size: 0.05
        track_unknown_space: true
        observation_persistence: 0.0
        max_obstacle_height: 2.0
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        obstacle_range: 2.5
        origin_z: 0.0
        publish_voxel_map: false
        transform_tolerance: 0.2
        mapping_mode: false
        map_save_duration: 10.0
        observation_sources: rgbd1_clear rgbd1_mark
        rgbd1_mark:
          data_type: PointCloud2
          topic: /point_cloud
          marking: true
          clearing: false
          min_obstacle_height: 0.30   # ignore the floor (raised from the old base's 0.15)
          max_obstacle_height: 2.0
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          clear_after_reading: true
          filter: "voxel"
          voxel_min_points: 0
        rgbd1_clear:
          enabled: true
          data_type: PointCloud2
          topic: /point_cloud
          marking: false
          clearing: true
          min_z: 0.1
          max_z: 7.0
          vertical_fov_angle: 0.7
          horizontal_fov_angle: 1.04
          decay_acceleration: 1.0
          model_type: 0
      always_send_full_costmap: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      # ESTIMATE — keep in sync with the local_costmap footprint.
      footprint: "[ [0.325, 0.25], [0.325, -0.25], [-0.325, -0.25], [-0.325, 0.25] ]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "rgbd_obstacle_layer", "inflation_layer"]
      # Keepout (virtual obstacles) is an OPT-IN overlay applied only when
      # use_keepout:=true — see nav2_omni_keepout.yaml + nav2_omni.launch.py.
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.0
          raytrace_min_range: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.10
      rgbd_obstacle_layer:
        # ZED2 3D obstacles in the global map (SpatioTemporalVoxelLayer) so the
        # planner also routes around tables / overhangs. Time-decays like the local.
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 2.0
        decay_model: 0
        voxel_size: 0.05
        track_unknown_space: true
        observation_persistence: 0.0
        max_obstacle_height: 2.0
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1
        obstacle_range: 3.0
        origin_z: 0.0
        publish_voxel_map: false
        transform_tolerance: 0.2
        mapping_mode: false
        map_save_duration: 10.0
        observation_sources: rgbd1_clear rgbd1_mark
        rgbd1_mark:
          data_type: PointCloud2
          topic: /point_cloud
          marking: true
          clearing: false
          min_obstacle_height: 0.30
          max_obstacle_height: 2.0
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          clear_after_reading: true
          filter: "voxel"
          voxel_min_points: 0
        rgbd1_clear:
          enabled: true
          data_type: PointCloud2
          topic: /point_cloud
          marking: false
          clearing: true
          min_z: 0.1
          max_z: 7.0
          vertical_fov_angle: 0.7
          horizontal_fov_angle: 1.04
          decay_acceleration: 0.0
          model_type: 0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True   # slam_toolbox publishes /map latched
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45
      always_send_full_costmap: False

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"   # Nav2 1.4.0 dropped the slash-style plugin name
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: False
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]   # dropped assisted_teleop (unused)
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.2
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # [vx, vy, wz] — Y axis opened up for the holonomic base.
    max_velocity: [0.5, 0.5, 1.2]
    min_velocity: [-0.35, -0.5, -1.2]
    max_accel: [2.2, 2.0, 2.5]
    max_decel: [-2.2, -2.0, -2.5]
    odom_topic: /odrive/odom
    odom_duration: 0.1
    deadband_velocity: [0.05, 0.05, 0.05]
    velocity_timeout: 1.0
