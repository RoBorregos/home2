# Keepout (virtual obstacle) OVERLAY for nav2_omni — applied ON TOP of
# nav2_omni.yaml ONLY when use_keepout:=true (see nav2_omni.launch.py).
#
# Why a separate file: if the keepout_filter is always declared in the costmaps'
# `filters` list, the costmap loads it and spams "Filter mask was not received"
# whenever the mask servers aren't running. Keeping it here means the filter is
# loaded ONLY when keepout is actually enabled — no warnings when it's off.
#
# Paints no-go areas (e.g. a whole table) the PLANNER must avoid, WITHOUT touching
# localization (slam_toolbox matches against its pose-graph, never the costmap).

local_costmap:
  local_costmap:
    ros__parameters:
      filters: ["keepout_filter"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"

global_costmap:
  global_costmap:
    ros__parameters:
      filters: ["keepout_filter"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: True
        filter_info_topic: "/costmap_filter_info"

# Publishes the CostmapFilterInfo that tells the KeepoutFilter how to read the mask.
costmap_filter_info_server:
  ros__parameters:
    use_sim_time: False
    type: 0                       # 0 = keepout / preferred-lanes filter
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base: 0.0
    multiplier: 1.0

# map_server instance that publishes the painted mask. yaml_filename is injected
# by the launch file (keepout_mask arg).
filter_mask_server:
  ros__parameters:
    use_sim_time: False
    frame_id: "map"
    topic_name: "/keepout_filter_mask"
