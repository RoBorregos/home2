# RESTAURANT overlay for nav2_omni.yaml — deep-merged on top of the base params
# by nav2_omni.launch.py (nav2_overlay_file:=<this file>). Only deltas live here;
# everything else stays in sync with nav2_omni.yaml automatically.
#
# Why these deltas (public venue, tables everywhere, any contact = e-stop):
# - voxel_decay 15 s: the ZED is WRIST-mounted. With the base value (2 s) a
#   tabletop marked by the camera vanishes from the costmap 2 s after the arm
#   pans to a customer — leaving only the lidar-visible table LEGS. The
#   restaurant furniture is static per the rulebook, so long persistence is safe.
# - inflation 0.55: extra soft clearance around table legs/chairs for MPPI.
# - lower velocity caps: crowded public space; smooth, slow motion also keeps
#   held drinks upright during delivery.

controller_server:
  ros__parameters:
    FollowPath:
      vx_max: 0.4
      vx_min: -0.2
      vy_max: 0.4
      wz_max: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      inflation_layer:
        inflation_radius: 0.55
      rgbd_obstacle_layer:
        voxel_decay: 15.0

global_costmap:
  global_costmap:
    ros__parameters:
      inflation_layer:
        inflation_radius: 0.55
      rgbd_obstacle_layer:
        voxel_decay: 15.0
