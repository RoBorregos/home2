# Follow-mode nav2 overrides — mecanum OMNIDIRECTIONAL omnibase.
#
# This is NOT a standalone nav2 config. nav2 is launched with nav2_omni.yaml
# (the "standard" config); person_goal_smoother.py reads ONLY the keys below and
# pushes them onto the running nav2 nodes via SetParameters when follow mode is
# activated, then restores the nav2_omni.yaml values when it is deactivated.
# (See CONTROLLER_KEYS / COSTMAP_KEYS / SMOOTHER_KEYS in person_goal_smoother.py.)
#
# Follow-mode intent vs. standard (nav2_omni.yaml):
#   * Velocity caps at standard level (0.5): a walking person does ~1.2 m/s, so
#     the old 0.35 cap made the robot fall behind until the person left the
#     depth range — the dominant loss mode. Lateral (vy) motion is KEPT
#     (holonomic) so the base can sidestep without yawing.
#   * GoalCritic down (the goal is a moving target; don't over-commit to it),
#     Path{Follow,Align}Critic up (stay glued to the freshly replanned path).
#   * CostCritic / obstacle avoidance left at full strength.
#
# Note: person_goal_smoother also DISABLES rgbd_obstacle_layer in follow mode
# (the ZED sees the followed person as an obstacle); the lidar obstacle_layer
# stays on. That toggle is done in code, not here.

controller_server:
  ros__parameters:
    FollowPath:
      # ---- Velocity limits (holonomic, matching standard so we keep up) ----
      vx_max: 0.5       # std 0.5 — was 0.35: too slow to keep up with a person
      vx_min: -0.3      # std -0.35
      vy_max: 0.5       # std 0.5 — lateral motion still allowed
      wz_max: 1.0       # std 1.2
      # ---- Critic weights tuned for chasing a moving goal ----
      GoalCritic:
        cost_weight: 3.0        # std 5.0 — moving target, don't over-commit
      PathFollowCritic:
        cost_weight: 8.0        # std 5.0 — hug the replanned path
      PathAlignCritic:
        cost_weight: 10.0       # std 6.0 — stay ON the path (position)
      PathAngleCritic:
        cost_weight: 2.0        # std 2.0 (unchanged; kept for completeness)
      CostCritic:
        cost_weight: 4.0        # std 4.0 — keep obstacle avoidance at full strength

local_costmap:
  local_costmap:
    ros__parameters:
      inflation_layer:
        cost_scaling_factor: 3.0   # std 3.0 (unchanged)
        inflation_radius: 0.40     # std 0.40 (unchanged)

global_costmap:
  global_costmap:
    ros__parameters:
      inflation_layer:
        cost_scaling_factor: 3.0
        inflation_radius: 0.40

velocity_smoother:
  ros__parameters:
    # [vx, vy, wz] — match standard forward speed (keep up with the person);
    # Y axis kept open (holonomic). NOTE: the omnibase reads /cmd_vel directly
    # (velocity_smoother bypassed), so the MPPI caps above are what actually
    # bind — these are kept in sync for when the smoother is back in the loop.
    max_velocity: [0.5, 0.5, 1.0]      # std [0.5, 0.5, 1.2]
    min_velocity: [-0.3, -0.5, -1.0]   # std [-0.35, -0.5, -1.2]
    max_accel: [2.0, 2.0, 2.5]         # std [2.2, 2.0, 2.5]
    max_decel: [-2.0, -2.0, -2.5]      # std [-2.2, -2.0, -2.5]
