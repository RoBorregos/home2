# slam_toolbox — LOCALIZATION ONLY (run against a pre-built map), mecanum omnibase indoors.
#
# Use this AFTER you have mapped the arena with slam.launch.py and saved a
# SERIALIZED pose-graph (NOT the .pgm/.yaml occupancy grid):
#     ros2 service call /slam_toolbox/serialize_map \
#         slam_toolbox/srv/SerializePoseGraph "{filename: '/home/<user>/omnibase_maps/arena'}"
#   -> writes arena.posegraph + arena.data
#
# In this mode slam_toolbox does NOT grow the map. It scan-matches against the
# loaded graph (keeping only a small rolling buffer of recent scans) and
# publishes the map->odom correction TF — i.e. it replaces AMCL.
#
# TF chain (unchanged from mapping): map -> odom -> base_link -> scan(=base_link)
#   * map  -> odom        : THIS node
#   * odom -> base_link   : the EKF (ekf.launch.py)

slam_toolbox:
  ros__parameters:

    # ---- Solver ----
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ---- Frames & I/O ----
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: localization                # <-- localize, do not build a new map

    # SERIALIZED map to localize against — absolute path on the robot, WITHOUT
    # extension (loads arena.posegraph + arena.data). The localization launch can
    # override this with map:=/abs/path, but set a sane default here too.
    map_file_name: /home/<user>/omnibase_maps/arena

    # Deterministic start pose ON the map [x, y, yaw_radians]. Best for competition:
    # park the robot at a known spot each round so it never needs a manual pose set.
    # Comment this out to instead set the start pose live in RViz ("2D Pose Estimate"
    # -> /initialpose).
    map_start_pose: [0.0, 0.0, 0.0]
    # map_start_at_dock: true

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02    # 50 Hz map->odom TF
    map_update_interval: 1.0
    resolution: 0.05
    min_laser_range: 0.10
    max_laser_range: 12.0
    minimum_time_interval: 0.2
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true

    # ---- Scan matching against the loaded graph ----
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.2
    minimum_travel_heading: 0.2
    scan_buffer_size: 10              # rolling window of recent scans kept for matching (localization)
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # ---- Correlation (local scan-match search window) ----
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # ---- Loop-closure search window ----
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ---- Scan-matcher penalties ----
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
