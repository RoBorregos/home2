collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_nav"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 2.0
    stop_pub_timeout: 1.0
    # Polygons
    polygons: ["Stop", "Slowdown"]
    Stop:
      type: "polygon"
      points: [ [0.35, 0.25], [0.35, -0.25], [-0.15, -0.25], [-0.15, 0.25] ]
      action_type: "stop"
      max_points: 3
    Slowdown:
      type: "polygon"
      points: [ [0.6, 0.4], [0.6, -0.4], [-0.25, -0.4], [-0.25, 0.4] ]
      action_type: "slowdown"
      slowdown_ratio: 0.3
      max_points: 3
    # Observation sources
    observation_sources: ["scan", "pointcloud_zed", "pointcloud_realsense"]
    scan:
      type: "scan"
      topic: "/scan"
    pointcloud_zed:
      type: "pointcloud"
      topic: "/point_cloud_nav"
      min_height: 0.1
      max_height: 1.5
    pointcloud_realsense:
      type: "pointcloud"
      topic: "/camera/camera/depth/color/points"
      min_height: 0.05
      max_height: 1.0
