# RTAB-Map Configuration File
rgbd_sync:
  ros__parameters:
    approx_sync: false
    use_sim_time: false
    qos: 1
    qos_camera_info: 1

rtabmap:
  ros__parameters:
    qos: 0
    qos_camera_info: 0
  # Basic ROS parameters
    subscribe_rgbd: true
    subscribe_rgb: false
    subscribe_depth: false
    subscribe_scan: true
    use_sim_time: false
    odom_sensor_sync: true
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"
    database_path: "/workspace/src/navigation/rtabmapdbs/rtabmap_follow.db"
    approx_sync: true
    #RTABMAP PARAMETERS
    "Rtabmap/DetectionRate": "2"
    "Mem/NotLinkedNodesKept": "false"
    "Kp/NNStrategy": "4"
    "Kp/MaxFeatures": "400"
    "Kp/DetectorStrategy": "11"
    "Kp/RoiRatios": "0.0 0.0 0.0 0.0"
    "SuperPoint/ModelPath": "/home/ros/models/superpoint_v1.pt"
    "SuperPoint/Threshold": "0.010"
    "SuperPoint/NMS": "true"
    "SuperPoint/NMSRadius": "4"
    "SuperPoint/Cuda": "true"
    "RGBD/LinearUpdate": "0.05"
    "RGBD/AngularUpdate": "0.05"
    "RGBD/ForceOdom3DoF": "true"
    "RGBD/StartAtOrigin": "false"
    "RGBD/ProximityPathMaxNeighbors" : "10"
    "RGBD/OptimizeMaxError": "3.0"
    #G2O Optimization
    "Optimizer/Strategy": "1"
    "Optimizer/Iterations": "20"
    "Optimizer/Epsilon": "0.00001"
    "Optimizer/Robust": "true"
    "Optimizer/GravitySigma": "0"
    "g2o/Solver": "3"
    #Odom strategy
    "Odom/Strategy": "1"
    "Odom/ResetCountdown": "0"
    "Odom/Holonomic": "false"
    "Odom/FilteringStrategy": "1"
    "Odom/ParticleSize": "400"
    #Strategy visICP
    "Reg/Strategy": "2"
    "Reg/Force3DoF": "true"
    "Vis/PnPRefineIterations": "0"
    "Vis/MinInliers": "20"
    "Vis/Iterations": "300"
    "Vis/FeatureType": "11"
    "Vis/MaxFeatures": "400"
    "Vis/CorNNType": "4"
    "Vis/CorNNDR": "0.6"
    "Vis/BundleAdjustment": "1"
    "Vis/CorGuessWinSize": "0"
    "Vis/GridRows": "1"
    "Vis/GridCols": "1"
    "Vis/RoiRatios": "0.0 0.0 0.0 0.0"
    # SuperGlue matcher (disabled — using BruteForceGPU until Python init issue resolved)
    # "Vis/CorNNType": "6"
    # "PyMatcher/Path": "/home/ros/SuperGlue/rtabmap_superglue.py"
    # "PyMatcher/Model": "indoor"
    # "PyMatcher/Iterations": "20"
    # "PyMatcher/Threshold": "0.2"
    # "PyMatcher/Cuda": "true"
    "Icp/Strategy": "1"
    "Icp/MaxCorrespondenceDistance": "0.1"
    "Icp/PointToPlane": "true"
    #grid
    "Grid/Sensor": "0"
    "Grid/FootprintLength": "0.4"
    "Grid/FootprintWidth": "0.4"
    "Grid/RangeMax": "2.0"
    "Grid/CellSize": "0.07"
    "Grid/3D": "false"
    "Grid/RayTracing": "false"
    "Grid/MaxGroundHeight": "0.1"
    "Grid/MaxObstacleHeight": "2.0"
