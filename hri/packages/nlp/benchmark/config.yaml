ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"
  timeout_s: 60

benchmark:
  runs: 3          # repeticiones para medir performance
  thinking: false  # si true, no agrega /no_think a los prompts

# Modelos a comparar (nombres de Ollama, e.g. qwen3, qwen3.5, gemma3:4b, llama3.2)
models:
  - qwen3

tasks:
  extract_data:
    enabled: true
    test_file: "../test/data_extractor.json"
  is_positive:
    enabled: true
    test_file: "../test/is_positive.json"
  is_negative:
    enabled: true
    test_file: "../test/is_negative.json"
  command_interpreter:
    enabled: false   # opt-in: scoring más complejo (Jaccard sobre action tokens)
    test_file: "../test/command_interpreter.json"

output:
  dir: "./results"
  save_json: true
