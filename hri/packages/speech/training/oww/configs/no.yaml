model_name: no
target_phrase:
  - "no"
  - "nope"
  - "noh"

# Synthetic data generation (Piper)
piper_sample_generator_path: .third_party/piper-sample-generator
n_samples: 5000
n_samples_val: 500
tts_batch_size: 50
# "no" collides hard with many common English words; we explicitly penalize
# them here and raise max_negative_weight below to match.
custom_negative_phrases:
  - "know"
  - "now"
  - "note"
  - "november"
  - "notice"
  - "nobody"
  - "normal"
  - "north"
  - "the cat sat"
  - "please open the door"
  - "what time is it"

# Augmentation
output_dir: .data/models
rir_paths:
  - .data/mit_rirs
background_paths:
  - .data/fma
  - .data/audioset_16k
background_paths_duplication_rate: [1, 1]
augmentation_rounds: 2
augmentation_batch_size: 16

# Model
model_type: dnn
layer_size: 32

# Training
feature_data_files:
  ACAV100M: .data/negative_features_large.npy
false_positive_validation_data_path: .data/validation_set_features.npy
batch_n_per_class: 1024
steps: 10000
# Higher negative weight — "no" is the worst collider of the four words.
max_negative_weight: 3000
target_false_positives_per_hour: 0.2
