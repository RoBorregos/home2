doorbell_detection:
  ros__parameters:
    audio_topic: /hri/rawAudioChunk
    KEYWORD_TOPIC: /hri/speech/ei_detection
    doorbell_label: "doorbell"
    sample_rate: 16000
    # Confidence gate: only publish a ring scoring above this (0..1).
    min_score: 0.6
    # --- Gating: the doorbell only rings while the robot waits at the door, and
    # its own TTS must not be mistaken for a bell. ---
    arm_topic: /hri/doorbell/armed
    saying_topic: /saying
    # require_arm: publish nothing until the task manager arms the detector while
    # waiting for a guest. Set False to run always (standalone debugging).
    require_arm: true
    mute_while_speaking: true
    # --- Auto-enrollment: the bell is the same within a round; enroll the first
    # confident ring so the second guest's ring is recognised even if fainter. ---
    enroll: true
    # A borderline ring whose fingerprint matches the enrolled bell at/above this
    # cosine similarity is confirmed even if its raw score is below min_score.
    template_sim_confirm: 0.85
    # --- Self-calibrating; the defaults below rarely need touching. ---
    # Stage 1 — adaptive loudness gate (dB above the learned ambient floor). A
    # bell is meant to be heard, so this margin is deliberately generous.
    active_margin_db: 10.0
    floor_alpha: 0.05
    # Stage 2 — pitch + purity. clarity_min high: a chime is a near-pure tone,
    # which rejects the formant-rich, lower-clarity vowels of party speech.
    pitch_min_hz: 200.0
    pitch_max_hz: 4000.0
    clarity_min: 0.80
    # Stage 3 — grouping frames into one ringing note. The chime signature that
    # speech does not produce: a pitch-stable tone SUSTAINED then DECAYING.
    pitch_tol: 0.06
    note_gap_ms: 80.0
    sustain_min_ms: 140.0
    max_note_ms: 2500.0
    min_decay_ratio: 1.25
    # Stage 4 — event confirmation. min_tones=1 accepts single-tone buzzers; the
    # sustain/decay/purity gates above reject speech, not the note count.
    min_tones: 1
    min_gap_s: 0.03
    max_gap_s: 2.0
    pattern_window_s: 3.5
    cooldown_s: 1.5
