door_eim:
  ros__parameters:
    audio_topic: /hri/rawAudioChunk
    KEYWORD_TOPIC: /hri/speech/ei_detection
    ei_server_url: "http://localhost:1337"
    sample_rate: 16000
    # EI model needs 32000 features (2.0 s @ 16 kHz); shorter returns 400.
    window_size_s: 2.0
    hop_ratio: 1.0
    sensitivity_threshold: 0.9
    detection_cooldown: 0.0
    audio_gain: 1.0
    noise_label: "noise"
    min_db: -45.0 # skip EI inference below this dBFS
    # Knock handled by knock_detection.py; EI emits only the doorbell label.
    target_labels: ["doorbell"]
    save_detection_audio: False
    audio_save_dir: /workspace/src/hri/packages/speech/assets/event_detections
