[general]
version = 1

[[segment]]

# No small pools (128, 1024, 16384 bytes) — forces CycloneDDS to use
# network DDS for small messages like parameter_events and TF.
# This avoids iceoryx TOO_MANY_CHUNKS_HELD_IN_PARALLEL during startup.
# Only large messages (camera images, depth maps) use SHM zero-copy.

# Medium images (depth maps, smaller frames)
[[segment.mempool]]
size = 524288
count = 50

# Full camera frames (~2MB each at 960x540 BGR)
[[segment.mempool]]
size = 2097152
count = 30

# Large images (HD1080 full resolution ~6MB)
[[segment.mempool]]
size = 8388608
count = 10
