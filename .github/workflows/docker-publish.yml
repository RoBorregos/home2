name: Docker Publish

on:
  push:
    branches: [docker-publish-workflow]
    paths:
      # Shared files that affect all areas
      - "docker/Dockerfile.ROS"
      - "docker/Dockerfile.ROS-l4t"
      # Area-specific files
      - "docker/hri/**"
      - "docker/vision/**"
      - "docker/navigation/**"
      - "docker/manipulation/**"
      - "docker/integration/**"
  workflow_dispatch:
    inputs:
      area:
        description: "Area to build and push (hri/vision/navigation/manipulation/integration/all)"
        required: false
        default: "all"

jobs:
  # ─────────────────────────────────────────────────────────────
  # DETECT — which areas changed
  # ─────────────────────────────────────────────────────────────
  detect:
    name: "Detect changed areas"
    runs-on: ubuntu-latest
    outputs:
      hri: ${{ steps.filter.outputs.hri }}
      vision: ${{ steps.filter.outputs.vision }}
      navigation: ${{ steps.filter.outputs.navigation }}
      manipulation: ${{ steps.filter.outputs.manipulation }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hri:
              - 'docker/hri/**'
              - 'docker/Dockerfile.ROS'
              - 'docker/Dockerfile.ROS-l4t'
            vision:
              - 'docker/vision/**'
            navigation:
              - 'docker/navigation/**'
            manipulation:
              - 'docker/manipulation/**'
            integration:
              - 'docker/integration/**'

  # ─────────────────────────────────────────────────────────────
  # HRI — 5 images × cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  hri:
    name: "HRI [${{ matrix.service }}] [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: detect
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'hri' || github.event.inputs.area == 'all')) ||
      (github.event_name == 'push' && needs.detect.outputs.hri == 'true')
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)
        service: [ros, stt, tts, postgres, ollama]
        exclude:
          # ollama only exists for cuda (and l4t when re-enabled)
          - service: ollama
            env: cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image name
        id: image
        run: |
          case "${{ matrix.service }}" in
            ros)      echo "name=roborregos/home2:hri-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            stt)      echo "name=roborregos/home2:hri-stt-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            tts)      echo "name=roborregos/home2:hri-tts-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            postgres) echo "name=roborregos/home2:hri-postgres-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            ollama)   echo "name=roborregos/home2:hri-ollama-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set Dockerfile path
        id: dockerfile
        run: |
          case "${{ matrix.service }}" in
            ros)      echo "path=docker/hri/dockerfiles/Dockerfile.ROS" >> $GITHUB_OUTPUT ;;
            stt)
              if [ "${{ matrix.env }}" = "l4t" ]; then
                echo "path=docker/hri/dockerfiles/Dockerfile.stt-l4t" >> $GITHUB_OUTPUT
              else
                echo "path=docker/hri/dockerfiles/Dockerfile.stt" >> $GITHUB_OUTPUT
              fi
              ;;
            tts)      echo "path=docker/hri/dockerfiles/Dockerfile.tts" >> $GITHUB_OUTPUT ;;
            postgres) echo "path=docker/hri/dockerfiles/Dockerfile.postgres" >> $GITHUB_OUTPUT ;;
            ollama)   echo "path=docker/hri/dockerfiles/Dockerfile.ollama" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.image.outputs.name }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # VISION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  vision:
    name: "Vision [${{ matrix.image }}] [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: detect
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'vision' || github.event.inputs.area == 'all')) ||
      (github.event_name == 'push' && needs.detect.outputs.vision == 'true')
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)
        image: [vision, moondream-server, moondream-node]
        exclude:
          # moondream images are env-independent (single tag), skip duplicates
          - image: moondream-server
            env: cuda
          - image: moondream-server
            env: l4t
          - image: moondream-node
            env: cuda
          - image: moondream-node
            env: l4t

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image name and Dockerfile
        id: meta
        run: |
          case "${{ matrix.image }}" in
            vision)
              echo "name=roborregos/home2:vision-${{ matrix.env }}" >> $GITHUB_OUTPUT
              echo "dockerfile=docker/vision/Dockerfile.${{ matrix.env }}" >> $GITHUB_OUTPUT
              ;;
            moondream-server)
              echo "name=roborregos/home2:moondream-server" >> $GITHUB_OUTPUT
              echo "dockerfile=docker/vision/Dockerfile.moondream.server" >> $GITHUB_OUTPUT
              ;;
            moondream-node)
              echo "name=roborregos/home2:moondream-node" >> $GITHUB_OUTPUT
              echo "dockerfile=docker/vision/Dockerfile.moondream" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.name }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.name }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # NAVIGATION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  navigation:
    name: "Navigation [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: detect
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'navigation' || github.event.inputs.area == 'all')) ||
      (github.event_name == 'push' && needs.detect.outputs.navigation == 'true')
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/navigation/Dockerfile.${{ matrix.env }}
          push: true
          tags: roborregos/home2:navigation-${{ matrix.env }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=roborregos/home2:navigation-${{ matrix.env }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # MANIPULATION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  manipulation:
    name: "Manipulation [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: detect
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'manipulation' || github.event.inputs.area == 'all')) ||
      (github.event_name == 'push' && needs.detect.outputs.manipulation == 'true')
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/manipulation/Dockerfile.${{ matrix.env }}
          push: true
          tags: roborregos/home2:manipulation-${{ matrix.env }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=roborregos/home2:manipulation-${{ matrix.env }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # INTEGRATION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  integration:
    name: "Integration [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: detect
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'integration' || github.event.inputs.area == 'all')) ||
      (github.event_name == 'push' && needs.detect.outputs.integration == 'true')
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/integration/Dockerfile
          push: true
          tags: roborregos/home2:integration-${{ matrix.env }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=roborregos/home2:integration-${{ matrix.env }}
          cache-to: type=inline
