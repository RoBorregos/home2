name: Docker Publish

on:
  push:
    branches: [postgres-publish]
    paths:
      # Shared files that affect all areas
      - "docker/Dockerfile.ROS"
      - "docker/Dockerfile.ROS-l4t"
      # Area-specific files
      - "docker/hri/**"
      - "docker/vision/**"
      - "docker/navigation/**"
      - "docker/manipulation/**"
      - "docker/integration/**"
  workflow_dispatch:
    inputs:
      area:
        description: "Area to build and push (hri/vision/navigation/manipulation/integration/all)"
        required: false
        default: "all"

jobs:
  # ─────────────────────────────────────────────────────────────
  # DETECT — which areas changed
  # ─────────────────────────────────────────────────────────────
  detect:
    name: "Detect changed areas"
    runs-on: ubuntu-latest
    outputs:
      base_needed: ${{ steps.base_check.outputs.needed }}
      hri: ${{ steps.filter.outputs.hri }}
      vision: ${{ steps.filter.outputs.vision }}
      navigation_matrix: ${{ steps.matrices.outputs.navigation }}
      manipulation_matrix: ${{ steps.matrices.outputs.manipulation }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            base:
              - 'docker/Dockerfile.ROS'
              - 'docker/cpu.yaml'
              - 'docker/cuda.yaml'
            hri:
              - 'docker/hri/**'
            vision:
              - 'docker/vision/**'
            navigation_cpu:
              - 'docker/navigation/Dockerfile.cpu'
            navigation_cuda:
              - 'docker/navigation/Dockerfile.cuda'
            manipulation_cpu:
              - 'docker/manipulation/Dockerfile.cpu'
            manipulation_cuda:
              - 'docker/manipulation/Dockerfile.cuda'
            integration:
              - 'docker/integration/**'

      - name: Check if base images exist on DockerHub
        id: base_check
        run: |
          needed=false
          if [ "${{ steps.filter.outputs.base }}" == "true" ]; then
            needed=true
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            needed=true
          else
            for tag in cpu_base cuda_base; do
              if ! docker manifest inspect "roborregos/home2:${tag}" > /dev/null 2>&1; then
                echo "::notice::Base image roborregos/home2:${tag} not found on DockerHub, will build"
                needed=true
                break
              fi
            done
          fi
          echo "needed=$needed" >> $GITHUB_OUTPUT

      - name: Build dynamic matrices
        id: matrices
        run: |
          # Navigation: only build the specific variant(s) that changed
          nav='[]'
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.area }}" == "navigation" ] || [ "${{ github.event.inputs.area }}" == "all" ]; then
              nav='["cpu","cuda"]'
            fi
          else
            [ "${{ steps.filter.outputs.navigation_cpu }}" == "true" ] && nav=$(echo "$nav" | jq -c '. + ["cpu"]')
            [ "${{ steps.filter.outputs.navigation_cuda }}" == "true" ] && nav=$(echo "$nav" | jq -c '. + ["cuda"]')
          fi
          echo "navigation=$nav" >> $GITHUB_OUTPUT

          # Manipulation: only build the specific variant(s) that changed
          manip='[]'
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.area }}" == "manipulation" ] || [ "${{ github.event.inputs.area }}" == "all" ]; then
              manip='["cpu","cuda"]'
            fi
          else
            [ "${{ steps.filter.outputs.manipulation_cpu }}" == "true" ] && manip=$(echo "$manip" | jq -c '. + ["cpu"]')
            [ "${{ steps.filter.outputs.manipulation_cuda }}" == "true" ] && manip=$(echo "$manip" | jq -c '. + ["cuda"]')
          fi
          echo "manipulation=$manip" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # BASE — cpu_base and cuda_base images (required by other jobs)
  # ─────────────────────────────────────────────────────────────
  base:
    name: "Base [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.base_needed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: cpu
            base_image: ubuntu:22.04
            tag: roborregos/home2:cpu_base
          - env: cuda
            base_image: nvidia/cuda:11.8.0-devel-ubuntu22.04
            tag: roborregos/home2:cuda_base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: docker
          file: docker/Dockerfile.ROS
          push: true
          tags: ${{ matrix.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=registry,ref=${{ matrix.tag }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # HRI — 5 images × cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  hri:
    name: "HRI [${{ matrix.service }}] [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: [detect, base]
    if: |
      always() &&
      (needs.detect.result == 'success') &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'hri' || github.event.inputs.area == 'all')) ||
        (github.event_name == 'push' && needs.detect.outputs.hri == 'true')
      )
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)
        service: [ros, stt, tts, ollama]
        exclude:
          # ollama only exists for cuda (and l4t when re-enabled)
          - service: ollama
            env: cpu

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image name
        id: image
        run: |
          case "${{ matrix.service }}" in
            ros)      echo "name=roborregos/home2:hri-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            stt)      echo "name=roborregos/home2:hri-stt-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            tts)      echo "name=roborregos/home2:hri-tts-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
            ollama)   echo "name=roborregos/home2:hri-ollama-${{ matrix.env }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Set Dockerfile path and context
        id: dockerfile
        run: |
          case "${{ matrix.service }}" in
            ros)
              echo "path=docker/hri/dockerfiles/Dockerfile.ROS" >> $GITHUB_OUTPUT
              echo "context=." >> $GITHUB_OUTPUT
              ;;
            stt)
              if [ "${{ matrix.env }}" = "l4t" ]; then
                echo "path=docker/hri/dockerfiles/Dockerfile.stt-l4t" >> $GITHUB_OUTPUT
              else
                echo "path=docker/hri/dockerfiles/Dockerfile.stt" >> $GITHUB_OUTPUT
              fi
              echo "context=." >> $GITHUB_OUTPUT
              ;;
            tts)
              echo "path=docker/hri/dockerfiles/Dockerfile.tts" >> $GITHUB_OUTPUT
              echo "context=." >> $GITHUB_OUTPUT
              ;;
            ollama)
              echo "path=docker/hri/dockerfiles/Dockerfile.ollama" >> $GITHUB_OUTPUT
              echo "context=docker/hri" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.dockerfile.outputs.context }}
          file: ${{ steps.dockerfile.outputs.path }}
          push: true
          tags: ${{ steps.image.outputs.name }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=${{ steps.image.outputs.name }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # HRI POSTGRES — generates SQL dumps then builds the image
  # ─────────────────────────────────────────────────────────────
  hri-postgres:
    name: "HRI [postgres]"
    runs-on: ubuntu-latest
    needs: [detect, base, hri]
    if: |
      always() &&
      (needs.detect.result == 'success') &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (needs.hri.result == 'success' || needs.hri.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'hri' || github.event.inputs.area == 'all')) ||
        (github.event_name == 'push' && needs.detect.outputs.hri == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Start PostgreSQL for dump generation
        run: |
          docker run -d --name postgres-temp \
            -e POSTGRES_USER=rbrgs \
            -e POSTGRES_PASSWORD=rbrgs \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            pgvector/pgvector:0.8.0-pg17
          # Wait for postgres to be ready
          for i in $(seq 1 30); do
            docker exec postgres-temp pg_isready -U rbrgs 2>/dev/null && break
            sleep 1
          done

      - name: Initialize database schema
        run: |
          docker exec postgres-temp psql -U rbrgs -d postgres -c "CREATE EXTENSION IF NOT EXISTS vector;"
          docker exec -i postgres-temp psql -U rbrgs -d postgres < docker/hri/init.sql

      - name: Generate SQL dumps
        run: |
          docker pull roborregos/home2:hri-cpu
          docker run --rm \
            --network host \
            --user root \
            -v ${{ github.workspace }}:/workspace/src \
            roborregos/home2:hri-cpu \
            bash -c "
              source /opt/ros/humble/setup.bash &&
              mkdir -p /tmp/pkg/embeddings &&
              cp /workspace/src/hri/packages/embeddings/embeddings/__init__.py /tmp/pkg/embeddings/ &&
              cp /workspace/src/hri/packages/embeddings/scripts/*.py /tmp/pkg/embeddings/ &&
              PYTHONPATH=/tmp/pkg:/workspace/src/frida_constants:\$PYTHONPATH python3 /workspace/src/hri/packages/embeddings/scripts/create_sql_dump.py
            "
          echo "Generated SQL dumps:"
          ls -la docker/hri/sql_dumps/

      - name: Stop temporary PostgreSQL
        if: always()
        run: docker stop postgres-temp && docker rm postgres-temp || true

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker/hri
          file: docker/hri/dockerfiles/Dockerfile.postgres
          push: true
          tags: |
            roborregos/home2:hri-postgres-cpu
            roborregos/home2:hri-postgres-cuda
          cache-from: type=registry,ref=roborregos/home2:hri-postgres-cpu
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # VISION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  vision:
    name: "Vision [${{ matrix.image }}] [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: [detect, base]
    if: |
      always() &&
      (needs.detect.result == 'success') &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'vision' || github.event.inputs.area == 'all')) ||
        (github.event_name == 'push' && needs.detect.outputs.vision == 'true')
      )
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)
        image: [vision, moondream-server, moondream-node]
        exclude:
          # moondream images are env-independent (single tag), skip duplicates
          - image: moondream-server
            env: cuda
          - image: moondream-server
            env: l4t
          - image: moondream-node
            env: cuda
          - image: moondream-node
            env: l4t

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image name and Dockerfile
        id: meta
        run: |
          case "${{ matrix.image }}" in
            vision)
              echo "name=roborregos/home2:vision-${{ matrix.env }}" >> $GITHUB_OUTPUT
              echo "dockerfile=docker/vision/Dockerfile.${{ matrix.env }}" >> $GITHUB_OUTPUT
              ;;
            moondream-server)
              echo "name=roborregos/home2:moondream-server" >> $GITHUB_OUTPUT
              echo "dockerfile=docker/vision/Dockerfile.moondream.server" >> $GITHUB_OUTPUT
              ;;
            moondream-node)
              echo "name=roborregos/home2:moondream-node" >> $GITHUB_OUTPUT
              echo "dockerfile=docker/vision/Dockerfile.moondream" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.meta.outputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.name }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.name }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # NAVIGATION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  navigation:
    name: "Navigation [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: [detect, base]
    if: |
      always() &&
      (needs.detect.result == 'success') &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      needs.detect.outputs.navigation_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.detect.outputs.navigation_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/navigation/Dockerfile.${{ matrix.env }}
          push: true
          tags: roborregos/home2:navigation-${{ matrix.env }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=roborregos/home2:navigation-${{ matrix.env }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # MANIPULATION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  manipulation:
    name: "Manipulation [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: [detect, base]
    if: |
      always() &&
      (needs.detect.result == 'success') &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      needs.detect.outputs.manipulation_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJSON(needs.detect.outputs.manipulation_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/manipulation/Dockerfile.${{ matrix.env }}
          push: true
          tags: roborregos/home2:manipulation-${{ matrix.env }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=roborregos/home2:manipulation-${{ matrix.env }}
          cache-to: type=inline

  # ─────────────────────────────────────────────────────────────
  # INTEGRATION — cpu + cuda (l4t excluded, requires self-hosted Jetson runner)
  # ─────────────────────────────────────────────────────────────
  integration:
    name: "Integration [${{ matrix.env }}]"
    runs-on: ubuntu-latest
    needs: [detect, base]
    if: |
      always() &&
      (needs.detect.result == 'success') &&
      (needs.base.result == 'success' || needs.base.result == 'skipped') &&
      (
        (github.event_name == 'workflow_dispatch' && (github.event.inputs.area == 'integration' || github.event.inputs.area == 'all')) ||
        (github.event_name == 'push' && needs.detect.outputs.integration == 'true')
      )
    strategy:
      fail-fast: false
      matrix:
        env: [cpu, cuda] # l4t excluded (requires self-hosted Jetson runner)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: roborregos
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set base image arg
        id: base
        run: |
          case "${{ matrix.env }}" in
            cpu)  echo "image=roborregos/home2:cpu_base" >> $GITHUB_OUTPUT ;;
            cuda) echo "image=roborregos/home2:cuda_base" >> $GITHUB_OUTPUT ;;
            l4t)  echo "image=roborregos/home2:l4t_base" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/integration/Dockerfile
          push: true
          tags: roborregos/home2:integration-${{ matrix.env }}
          build-args: |
            BASE_IMAGE=${{ steps.base.outputs.image }}
          cache-from: type=registry,ref=roborregos/home2:integration-${{ matrix.env }}
          cache-to: type=inline
