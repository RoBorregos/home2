syntax = "proto3";

package moondream;

service MoonDreamService {
  rpc EncodeImage (ImageRequest) returns (EncodedImageResponse);
  rpc FindBeverage (FindBeverageRequest) returns (BeveragePositionResponse);
  rpc FindObjectPoints (FindObjectPointsRequest) returns (FindObjectPointsResponse);
  rpc DetectObject (DetectObjectRequest) returns (DetectObjectResponse);
  rpc Query (QueryRequest) returns (QueryResponse);
}

message ImageRequest {
  bytes image_data = 1;
}

message EncodedImageResponse {
  bytes encoded_image = 1;
}

message FindBeverageRequest {
  bytes encoded_image = 1;
  string subject = 2;
}

message BeveragePositionResponse {
  string position = 1;
}

message QueryRequest {
  bytes encoded_image = 1;
  string query = 2;
}

message QueryResponse {
  string answer = 1;
}

message FindObjectPointsRequest {
  bytes encoded_image = 1;
  string subject = 2;
}

message ObjectPoint {
  float x = 1;
  float y = 2;
}

message FindObjectPointsResponse {
  repeated ObjectPoint points = 1;
  bool found = 2;
}

message DetectObjectRequest {
  bytes encoded_image = 1;
  string subject = 2;
}

message DetectObjectResponse {
  bool found = 1;
  float x_min = 2;
  float y_min = 3;
  float x_max = 4;
  float y_max = 5;
}
