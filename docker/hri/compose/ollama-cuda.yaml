services:
  llm:
    profiles: [hric, carry, gpsr, storing]
    container_name: home2-hri-llamacpp-cuda
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.llamacpp
    image: roborregos/home2:hri-llamacpp-cuda
    runtime: nvidia
    network_mode: host
    volumes:
      - ../../../hri/packages/nlp/assets:/models
    environment:
      ROLE: ${ROLE}
    stdin_open: true
    tty: true
    entrypoint:
      ["/bin/bash", "-c", "/scripts/entrypoint.sh && tail -f /dev/null"]
