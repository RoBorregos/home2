services:
  vllm:
    profiles: [hric, gpsr, benchmark]
    container_name: home2-hri-vllm-l4t
    image: dustynv/vllm:0.7.4-r36.4.0
    runtime: nvidia
    network_mode: host
    shm_size: 8gb
    volumes:
      - ../../../hri/packages/nlp/assets:/root/.cache/huggingface
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra
      - ../scripts/vllm-entrypoint.sh:/scripts/entrypoint.sh
    environment:
      ROLE: ${ROLE}
      VLLM_PORT: ${VLLM_PORT:-11436}
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-30B-A3B-AWQ}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH: /usr/lib/aarch64-linux-gnu/tegra
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
