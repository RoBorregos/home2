services:
  llm:
    profiles: [hric, carry, gpsr, storing]
    container_name: home2-hri-llamacpp-l4t
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile.llamacpp
      args:
        # Latest Jetson-compatible llama.cpp image (L4T r36.4, CUDA 12.8, Ubuntu 24.04)
        # Supports Qwen3, Gemma 4, and other recent architectures.
        # To upgrade: check https://hub.docker.com/r/dustynv/llama_cpp/tags
        BASE_IMAGE: dustynv/llama_cpp:b5283-r36.4-cu128-24.04

    image: roborregos/home2:hri-llamacpp-l4t
    runtime: nvidia
    network_mode: host
    volumes:
      - ../../../hri/packages/nlp/assets:/models
    environment:
      ROLE: ${ROLE}
    stdin_open: true
    tty: true
    entrypoint:
      ["/bin/bash", "-c", "/scripts/entrypoint.sh && tail -f /dev/null"]
