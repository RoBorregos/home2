services:
  llama:
    profiles: [hric, carry, gpsr, storing]
    container_name: home2-hri-llama-l4t
    image: ghcr.io/nvidia-ai-iot/llama_cpp:latest-jetson-orin
    pull_policy: missing
    runtime: nvidia
    network_mode: host
    volumes:
      - ../../../hri/packages/nlp/assets:/root/.cache/huggingface
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra
      - ../scripts/llama-cpp-entrypoint.sh:/scripts/entrypoint.sh
    environment:
      ROLE: ${ROLE}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "/scripts/entrypoint.sh"]
