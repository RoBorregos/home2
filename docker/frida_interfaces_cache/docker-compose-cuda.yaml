services:
  frida_interfaces_cache:
    build:
      context: .
      dockerfile: ../Dockerfile.ROS
      args:
        BASE_IMAGE: ubuntu:22.04
    image: roborregos/home2:cuda_base
    container_name: home2-frida-interfaces-cache
    volumes:
      - ../../:/workspace/src
      - ./build:/workspace/frida_interfaces_cache/build
      - ./install:/workspace/frida_interfaces_cache/install
      - ./log:/workspace/log
    tty: true
    user: ${UID}:${GID}
    entrypoint: ["bash", "-il", "-c"]
    command: ["source /opt/ros/humble/setup.bash && colcon build --build-base /workspace/frida_interfaces_cache/build --install-base /workspace/frida_interfaces_cache/install --packages-select frida_interfaces xarm_msgs && colcon build --symlink-install --build-base /workspace/frida_interfaces_cache/build --install-base /workspace/frida_interfaces_cache/install --packages-select frida_constants"]
