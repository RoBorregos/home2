services:
  simulation:
    container_name: home2-simulation
    build:
      context: ../..
      dockerfile: docker/simulation/Dockerfile.simulation
      args:
        BASE_IMAGE: ${BASE_IMAGE}
    image: ${IMAGE_NAME}
    runtime: ${DOCKER_RUNTIME:-}
    volumes:
      - ../../:/workspace/src/
      - /dev:/dev
      - /tmp:/tmp
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./build:/workspace/build
      - ./install:/workspace/install
      - ./log:/workspace/log
      - ../frida_interfaces_cache:/workspace/frida_interfaces_cache
      - ${HOME}/.Xauthority:/home/ros/.Xauthority:rw
      - ../manipulation/setup_gpd.sh:/home/ros/setup_gpd.sh
    network_mode: host
    ipc: host
    user: ${LOCAL_USER_ID}:${LOCAL_GROUP_ID}
    privileged: true
    ulimits:
      nofile:
        soft: 1024
        hard: 524288
    environment:
      DISPLAY: ${DISPLAY}
      TERM: xterm-256color
      CYCLONE_INTERFACE: ${CYCLONE_INTERFACE:-}
      CYCLONEDDS_URI: file:///etc/cyclonedds.xml
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
      NVIDIA_DRIVER_CAPABILITIES: all
    tty: true
    stdin_open: true
    working_dir: /workspace
    command: /bin/bash -c "${COMMAND:-bash}"
