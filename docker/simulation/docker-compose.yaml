services:
  simulation:
    container_name: home2-simulation
    build:
      context: ../..
      dockerfile: docker/simulation/Dockerfile.simulation
      args:
        BASE_IMAGE: ${BASE_IMAGE}
    image: ${IMAGE_NAME}
    volumes:
      - ../../:/workspace/src/
      - /dev:/dev
      - /tmp:/tmp
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./build:/workspace/build
      - ./install:/workspace/install
      - ./log:/workspace/log
      - ../frida_interfaces_cache:/workspace/frida_interfaces_cache
      - ${HOME}/.Xauthority:/home/ros/.Xauthority:rw # For GUI applications
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    group_add: 
      - video
    network_mode: host
    user: ${LOCAL_USER_ID}:${LOCAL_GROUP_ID}
    privileged: true
    environment:
      DISPLAY: ${DISPLAY}
      TERM: xterm-256color
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      QT_X11_NO_MITSHM: 1
      CYCLONE_INTERFACE: ${CYCLONE_INTERFACE:-}
    tty: true
    stdin_open: true    
    working_dir: /workspace
    command: /bin/bash -c "${COMMAND:-bash}"
