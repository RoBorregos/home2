services:
  zed:
    container_name: home2-zed
    image: ${IMAGE_NAME:-roborregos/home2:l4t_base}
    volumes:
      - /dev:/dev
      - /tmp:/tmp
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $HOME/.Xauthority:/home/ros/.Xauthority:rw
      - /run/jtop.sock:/run/jtop.sock
      # ZED workspace from host
      - ${ZED_WORKSPACE:-/home/orin/zed}:/workspace/zed
      # SHM override to disable parameter_events publisher
      - ../../zed_shm_override.yaml:/workspace/zed_shm_override.yaml:ro
    network_mode: host
    ipc: host
    user: ${LOCAL_USER_ID}:${LOCAL_GROUP_ID}
    privileged: true
    runtime: ${DOCKER_RUNTIME:-runc}
    group_add:
      - video
    environment:
      DISPLAY: ${DISPLAY}
      TERM: xterm-256color
      QT_X11_NO_MITSHM: 1
      CYCLONE_INTERFACE: ${CYCLONE_INTERFACE:-}
    tty: true
    stdin_open: true
    working_dir: /workspace
    command: >
      bash -c "source /opt/ros/humble/setup.bash &&
      source /workspace/zed/install/local_setup.bash &&
      ros2 launch zed_wrapper zed_camera.launch.py
      camera_model:=${ZED_CAMERA_MODEL:-zed2}
      publish_tf:=false
      ros_params_override_path:=/workspace/zed_shm_override.yaml"
