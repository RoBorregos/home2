services:
  zed:
    container_name: home2-zed
    build:
      context: ../..
      dockerfile: docker/zed/Dockerfile.l4t
      args:
        BASE_IMAGE: ${BASE_IMAGE:-roborregos/home2:l4t_base}
    image: ${IMAGE_NAME:-roborregos/home2:zed-l4t}
    volumes:
      - /dev:/dev
      - /tmp:/tmp
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $HOME/.Xauthority:/home/ros/.Xauthority:rw
      - /run/jtop.sock:/run/jtop.sock
    network_mode: host
    ipc: host
    user: ${LOCAL_USER_ID}:${LOCAL_GROUP_ID}
    privileged: true
    runtime: ${DOCKER_RUNTIME:-runc}
    group_add:
      - video
      - "1001"
    environment:
      DISPLAY: ${DISPLAY}
      TERM: xterm-256color
      QT_X11_NO_MITSHM: 1
      CYCLONE_INTERFACE: ${CYCLONE_INTERFACE:-}
      ZED_CAMERA_MODEL: ${ZED_CAMERA_MODEL:-zed2}
    tty: true
    stdin_open: true
    working_dir: /opt/zed_ws
    command: >
      bash -c "
      rm -f /tmp/roudi.lock 2>/dev/null;
      echo '=== ZED SDK check ===' && ls /usr/local/zed/lib/libsl_zed.so* 2>/dev/null || echo 'WARNING: libsl_zed.so NOT found in /usr/local/zed/lib/';
      export LD_LIBRARY_PATH=/usr/local/zed/lib:$${LD_LIBRARY_PATH};
      sudo sed -i 's|<LogLevel>warning</LogLevel>|<LogLevel>warn</LogLevel>|' /etc/cyclonedds.xml 2>/dev/null || true;
      source /opt/ros/humble/setup.bash &&
      source /usr/local/bin/cyclonedds_setup.sh &&
      sleep 2 &&
      source /opt/zed_ws/install/setup.bash &&
      sudo python3 /opt/zed_ws/zed_shm_launch.py &&
      ros2 launch zed_wrapper zed_camera.launch.py
      camera_model:=${ZED_CAMERA_MODEL:-zed2}
      publish_tf:=false
      ros_params_override_path:=/opt/zed_ws/zed_shm_override.yaml"
